    <path d="M 158 87 L 180 87 L 163 74 L 142 74 L 128 87 L 95 97 L 50 70 L 78 101 L 55 111 L 102 133 L 40 151 L 78 140 L 103 140 L 132 125 L 152 107 Z" 
